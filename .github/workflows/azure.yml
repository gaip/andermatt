name: Deploy to Azure App Service

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      slot-name:
        description: 'Azure App Service deployment slot (leave empty for production)'
        required: false
        default: ''

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ensure publish profile secret is present
        shell: bash
        run: |
          pp="${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}"
          if [[ -z "${pp}" ]]; then
            echo "ERROR: AZURE_WEBAPP_PUBLISH_PROFILE secret is missing or empty."
            echo "Please set the secret in the repository settings with the publish profile"
            echo "downloaded from Azure Portal > App Service 'andermatt-roadmap' > Get publish profile."
            exit 1
          fi

      - name: Deploy to Azure Web App
        # NOTE: Deployment will fail if the publish profile secret does not match
        # the target app ('andermatt-roadmap') and slot. Regenerate the publish profile
        # from Azure Portal if you see "Publish profile is invalid" errors.
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'andermatt-roadmap'
          slot-name: ${{ github.event.inputs.slot-name != '' && github.event.inputs.slot-name || 'production' }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: '.'
